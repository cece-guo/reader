<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXX科技 · FA标准品综合目录 · 阅读器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2547;
    --navy-mid: #1a3a6e;
    --navy-light: #2356a8;
    --gold: #c8a84b;
    --white: #ffffff;
    --text-1: #0d1b2e;
    --text-2: #4a5568;
    --text-3: #8fa0b5;
    --border: #dde3ec;
    --surface: #f0f2f5;
    --sidebar-w: 52px;
    --header-h: 52px;
    --bottom-h: 48px;
    --toc-w: 288px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
    color: var(--text-1); background: var(--surface);
  }

  /* ─────────────────────────────
     LAYOUT SHELL
  ───────────────────────────── */
  .shell { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* ── Top Header ── */
  .top-bar {
    height: var(--header-h); background: var(--navy);
    display: flex; align-items: center; padding: 0 14px 0 0;
    flex: 0 0 var(--header-h); z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: rgba(255,255,255,0.7); cursor: pointer; padding: 8px 14px;
    border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
    transition: color 0.15s; height: 100%;
  }
  .back-btn:hover { color: #fff; }
  .back-btn svg { flex-shrink: 0; }
  .doc-title { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 500; padding: 0 20px; }
  .top-tools { margin-left: auto; display: flex; align-items: center; gap: 2px; }
  .tool-btn {
    width: 34px; height: 34px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: rgba(255,255,255,0.6); transition: all 0.15s;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.15); }
  .tool-btn.on { background: var(--gold); color: var(--navy); border-color: var(--gold); }
  .tool-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.15); margin: 0 8px; }
  .page-jump {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: rgba(255,255,255,0.65); padding-left: 10px;
    border-left: 1px solid rgba(255,255,255,0.1); margin-left: 6px;
  }
  .page-jump input {
    width: 48px; height: 28px; border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px; text-align: center; font-size: 12px;
    background: rgba(255,255,255,0.08); color: #fff; outline: none;
    font-family: inherit;
  }
  .page-jump input:focus { border-color: var(--gold); }

  /* ── Mid Row ── */
  .mid-row { display: flex; flex: 1; min-height: 0; }

  /* ── Left Sidebar (TOC Trigger) ── */
  .left-rail {
    width: var(--sidebar-w); background: var(--navy-mid);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 4px; flex: 0 0 var(--sidebar-w);
    border-right: 1px solid rgba(255,255,255,0.08);
    z-index: 50;
  }
  .rail-item {
    width: 40px; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 8px 0; border-radius: 6px; cursor: pointer;
    color: rgba(255,255,255,0.55); transition: all 0.15s;
  }
  .rail-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .rail-item.active { background: var(--gold); color: var(--navy); }
  .rail-item.toc-trigger { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  .rail-icon { font-size: 15px; line-height: 1; }
  .rail-label { font-size: 9px; line-height: 1; text-align: center; letter-spacing: 0.02em; }
  .rail-divider { width: 28px; height: 1px; background: rgba(255,255,255,0.12); margin: 4px 0; }
  .rail-badge { position: relative; }
  .rail-badge::after { content: ''; position: absolute; top: 4px; right: 2px; width: 6px; height: 6px; background: #e03e3e; border-radius: 50%; border: 1px solid var(--navy-mid); }

  /* ── TOC Panel ── */
  .toc-panel {
    width: 0; background: var(--white); flex: 0 0 auto; overflow: hidden;
    transition: width 0.24s cubic-bezier(0.4,0,0.2,1);
    border-right: 0px solid var(--border); display: flex;
  }
  .toc-panel.open { width: var(--toc-w); border-right-width: 1px; }
  .toc-inner { width: var(--toc-w); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  .toc-head {
    padding: 14px 16px 12px; background: var(--navy); display: flex;
    align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .toc-head-title { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
  .toc-close {
    width: 24px; height: 24px; background: rgba(255,255,255,0.1); border: none;
    border-radius: 4px; cursor: pointer; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    transition: background 0.15s;
  }
  .toc-close:hover { background: rgba(255,255,255,0.2); color: #fff; }

  .toc-search { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .toc-search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
  }
  .toc-search-wrap input { border: none; background: transparent; font-size: 12px; color: var(--text-1); outline: none; flex: 1; font-family: inherit; }
  .toc-search-wrap input::placeholder { color: var(--text-3); }
  .toc-reset { font-size: 11px; color: var(--navy-light); cursor: pointer; white-space: nowrap; border: none; background: transparent; font-family: inherit; }
  .toc-reset:hover { text-decoration: underline; }

  .toc-list { flex: 1; overflow-y: auto; }
  .toc-list::-webkit-scrollbar { width: 4px; }
  .toc-list::-webkit-scrollbar-track { background: transparent; }
  .toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .toc-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 11px 16px;
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background 0.12s; user-select: none;
  }
  .toc-item:hover { background: #f7f9fc; }
  .toc-item.current { background: #eef3fb; border-left: 3px solid var(--navy-mid); }
  .toc-num { font-size: 11px; color: var(--navy-mid); font-weight: 700; min-width: 22px; flex-shrink: 0; padding-top: 1px; font-family: 'DM Sans', sans-serif; }
  .toc-name { flex: 1; font-size: 12px; color: var(--text-1); line-height: 1.55; }
  .toc-item.current .toc-name { color: var(--navy-mid); font-weight: 500; }
  .toc-pg { font-size: 11px; color: var(--text-3); flex-shrink: 0; font-family: 'DM Sans', sans-serif; padding-top: 1px; }
  .toc-item.current .toc-pg { color: var(--navy-mid); }

  /* ── Viewer Area ── */
  .viewer {
    flex: 1; position: relative; background: #7a7e85;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(15,37,71,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(15,37,71,0.1) 0%, transparent 50%);
  }
  /* Grid texture */
  .viewer::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .prev-arrow, .next-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.93); border: 1px solid rgba(0,0,0,0.12);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 10; color: var(--navy); font-size: 18px;
    transition: background 0.15s, transform 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    user-select: none;
  }
  .prev-arrow { left: 16px; }
  .next-arrow { right: 16px; }
  .prev-arrow:hover, .next-arrow:hover { background: #fff; transform: translateY(-50%) scale(1.05); }
  .prev-arrow:active, .next-arrow:active { transform: translateY(-50%) scale(0.97); }

  .spread-wrap {display: flex; gap: 4px; align-items: center; }
  .spread-wrap.anim-right { animation: fromRight 0.26s cubic-bezier(0.4,0,0.2,1) both; }
  .spread-wrap.anim-left  { animation: fromLeft  0.26s cubic-bezier(0.4,0,0.2,1) both; }
  .spread-wrap.exit-left  { animation: toLeft    0.26s cubic-bezier(0.4,0,0.2,1) both; }
  .spread-wrap.exit-right { animation: toRight   0.26s cubic-bezier(0.4,0,0.2,1) both; }

  @keyframes fromRight { from { transform: translateX(56px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes fromLeft  { from { transform: translateX(-56px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes toLeft    { from { transform: translateX(0); opacity:1; } to { transform: translateX(-56px); opacity:0; } }
  @keyframes toRight   { from { transform: translateX(0); opacity:1; } to { transform: translateX(56px); opacity:0; } }

  /* ── Page Canvas ── */
  .page-canvas {
    width: 500px; height: 705px; background: #fff;
    border-radius: 2px; overflow: hidden; position: relative; flex-shrink: 0;
    box-shadow: 3px 3px 16px rgba(0,0,0,0.3), -1px 0 4px rgba(0,0,0,0.1);
  }
  .page-canvas + .page-canvas { box-shadow: -3px 3px 16px rgba(0,0,0,0.3), 1px 0 4px rgba(0,0,0,0.1); }
  .pc { padding: 14px 13px; height: 100%; display: flex; flex-direction: column; font-family: 'Noto Sans SC', sans-serif; }
  .pc-hdr { display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid var(--navy); padding-bottom: 5px; margin-bottom: 10px; }
  .pc-hdr-l { font-size: 7.5px; font-weight: 700; color: var(--navy); }
  .pc-hdr-r { font-size: 7px; color: var(--text-3); }
  .pc-title { font-size: 11px; font-weight: 700; color: var(--navy); line-height: 1.45; margin-bottom: 6px; }
  .pc-sub { font-size: 7.5px; color: var(--text-2); margin-bottom: 8px; line-height: 1.6; }
  .pc-img { background: #f0f4fb; border: 1px dashed #b8cae0; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 7px; color: #8fa0b5; margin-bottom: 7px; }
  .pc-price { font-size: 17px; font-weight: 700; color: #c0392b; font-family: 'DM Sans', sans-serif; margin-bottom: 2px; }
  .pc-price-label { font-size: 7px; color: var(--text-3); margin-bottom: 6px; }
  .pc-specs { display: flex; gap: 4px; margin-bottom: 7px; }
  .pc-spec { flex: 1; border: 1px solid var(--border); border-radius: 3px; padding: 3px 4px; }
  .pc-spec-l { font-size: 6.5px; color: var(--text-3); margin-bottom: 1px; }
  .pc-spec-v { font-size: 8.5px; font-weight: 600; color: var(--navy); }
  .pc-table { width: 100%; border-collapse: collapse; font-size: 7px; }
  .pc-table th { background: var(--navy); color: #fff; padding: 3px 4px; text-align: left; font-weight: 600; }
  .pc-table td { padding: 2.5px 4px; border-bottom: 1px solid #eef0f3; color: var(--text-1); }
  .pc-table tr:nth-child(even) td { background: #f7f9fc; }
  .pc-divider { height: 1px; background: var(--border); margin: 7px 0; }
  .pc-sec { font-size: 7px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .pc-para { font-size: 7px; color: var(--text-2); line-height: 1.65; }
  .pc-tag { display: inline-block; font-size: 6px; padding: 1.5px 5px; border-radius: 8px; background: var(--navy); color: #fff; margin: 1px 2px 1px 0; }
  .pc-tag-out { background: transparent; border: 1px solid var(--navy); color: var(--navy); }
  .pc-num { position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; font-size: 7px; color: var(--text-3); font-family: 'DM Sans', sans-serif; }
  .pc-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .pc-big { font-size: 15px; font-weight: 700; color: var(--navy); text-align: center; line-height: 1.5; }
  .pc-toc-row { display: flex; align-items: baseline; gap: 3px; padding: 3px 0; border-bottom: 1px solid #f0f2f5; font-size: 8px; }
  .pc-toc-num { color: var(--navy); font-weight: 700; min-width: 16px; font-size: 7px; }
  .pc-toc-name { flex: 1; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 7.5px; }
  .pc-dots { flex: 0 0 20px; border-bottom: 1px dotted #ccc; margin: 0 3px; align-self: center; }
  .pc-toc-pg { color: var(--navy); font-weight: 700; font-size: 7px; }

  /* ── Right Sidebar ── */
  .right-rail {
    width: var(--sidebar-w); background: var(--white);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 2px; flex: 0 0 var(--sidebar-w);
    border-left: 1px solid var(--border);
  }
  .right-item {
    width: 42px; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 9px 0; border-radius: 6px; cursor: pointer;
    color: var(--text-3); transition: all 0.15s;
  }
  .right-item:hover { background: #f0f4fb; color: var(--navy-mid); }
  .right-item.active { background: #eef3fb; color: var(--navy-mid); }
  .right-icon { font-size: 16px; line-height: 1; }
  .right-label { font-size: 9.5px; line-height: 1; text-align: center; }
  .right-divider { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }
  .right-notif { position: relative; }
  .right-notif::after { content: ''; position: absolute; top: 7px; right: 4px; width: 6px; height: 6px; background: #e03e3e; border-radius: 50%; border: 1.5px solid var(--white); }

  /* ── Bottom Bar ── */
  .bottom-bar {
    height: var(--bottom-h); background: rgba(15,25,45,0.95);
    display: flex; align-items: center; padding: 0 16px; gap: 14px;
    flex: 0 0 var(--bottom-h); border-top: 1px solid rgba(255,255,255,0.06);
  }
  .nav-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .nav-btn {
    width: 30px; height: 30px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    transition: background 0.12s; font-family: 'DM Sans', sans-serif; user-select: none;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-btn:active { transform: scale(0.95); }
  .progress-area { flex: 1; display: flex; align-items: center; gap: 10px; }
  .progress-track {
    flex: 1; height: 4px; background: rgba(255,255,255,0.15);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.2s; position: relative; }
  .progress-thumb {
    position: absolute; right: -5px; top: -4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--gold); border: 2px solid rgba(255,255,255,0.9);
  }
  .pct-label { font-size: 11px; color: rgba(255,255,255,0.45); min-width: 32px; text-align: right; font-family: 'DM Sans', sans-serif; }
</style>
</head>

<div class="shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="back-btn" onclick="history.back()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      书架
    </div>
    <div class="doc-title">FA标准品综合目录 · 2024版</div>
    <div class="top-tools">
      <div class="tool-btn on" id="toc-btn" title="目录" onclick="toggleTOC()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="16" y2="12"/><line x1="3" y1="18" x2="13" y2="18"/></svg>
      </div>
      <div class="tool-sep"></div>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="fav-icon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div> -->
      <div class="tool-btn" title="下载">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="tool-btn" title="打印">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </div>
      <div class="tool-btn" title="分享">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </div>
      <div class="tool-sep"></div>
      <div class="page-jump">
        <span>第</span>
        <input id="page-input" value="1" onchange="jumpTo(+this.value)" />
        <span>页 / <b id="total-disp" style="color:rgba(255,255,255,0.9);font-family:'DM Sans',sans-serif;">1954</b></span>
      </div>
    </div>
  </div>

  <!-- MID ROW -->
  <div class="mid-row">

    <!-- LEFT RAIL -->
    <div class="left-rail">
      <div class="rail-item toc-trigger" id="rail-toc" title="分类一览" onclick="toggleTOC()">
        <div class="rail-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="16" y2="12"/><line x1="3" y1="18" x2="13" y2="18"/></svg>
        </div>
        <div class="rail-label">目录</div>
      </div>
      <div class="rail-divider"></div>
      <div class="rail-item" title="收藏" onclick="toggleFav()">
        <div class="rail-icon">⭐</div>
        <div class="rail-label">收藏</div>
      </div>
      <div class="rail-item" title="书架" onclick="history.back()">
        <div class="rail-icon">📚</div>
        <div class="rail-label">书架</div>
      </div>
      <div class="rail-divider"></div>
      <div class="rail-item" title="教程">
        <div class="rail-icon">📖</div>
        <div class="rail-label">教程</div>
      </div>
      <div class="rail-item rail-badge" title="新品推荐">
        <div class="rail-icon">🆕</div>
        <div class="rail-label">新品</div>
      </div>
      <div class="rail-item" title="计算工具">
        <div class="rail-icon">🔧</div>
        <div class="rail-label">计算</div>
      </div>
      <div class="rail-divider"></div>
      <div class="rail-item" title="联系客服">
        <div class="rail-icon">💬</div>
        <div class="rail-label">客服</div>
      </div>
      <div class="rail-item" title="停售通知">
        <div class="rail-icon">🔔</div>
        <div class="rail-label">停售</div>
      </div>
    </div>

    <!-- TOC PANEL -->
    <div class="toc-panel open" id="toc-panel">
      <div class="toc-inner">
        <div class="toc-head">
          <div class="toc-head-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="16" y2="12"/><line x1="3" y1="18" x2="13" y2="18"/></svg>
            分类一览
          </div>
          <button class="toc-close" onclick="toggleTOC()">✕</button>
        </div>
        <div class="toc-search">

function getContent(pg) {

    <tr><td>6200</td><td>10</td><td>30</td><td>9</td><td>5.1</td></tr>

      <div class="pc-spec"><div class="pc-spec-l">精度</div><div class="pc-spec-v">JIS 6级</div></div>
    </div>

    <table class="pc-table"><tr><th>模数</th><th>齿数Z</th><th>外径</th><th>重量g</th></tr>
    <tr><td>1</td><td>20</td><td>22</td><td>18</td></tr>
    <tr><td>2</td><td>20</td><td>44</td><td>95</td></tr>
    <tr><td>3</td><td>20</td><td>66</td><td>310</td></tr>
    <tr><td>4</td><td>20</td><td>88</td><td>730</td></tr></table>
    <div class="pc-divider"></div>
    <div style="display:flex;gap:3px;"><span class="pc-tag">S45C(调质)</span><span class="pc-tag pc-tag-out">MC Nylon</span></div>
  `;
  if (pg >= 1295 && pg < 1355) return `
    <div class="pc-hdr"><span class="pc-hdr-l">弹簧·缓冲器 · Spring</span><span class="pc-hdr-r">P.${pg}</span></div>
    <div class="pc-title">压缩弹簧 精密型 SWP系列</div>
    <div class="pc-sub">适用于自动化设备、模具夹具等精密机械场合，提供稳定可靠的回弹力。</div>
    <div class="pc-divider"></div>
    <div class="pc-sec">产品规格一览</div>
    <table class="pc-table"><tr><th>型号</th><th>外径</th><th>线径</th><th>自由长</th><th>弹簧常数</th></tr>
    <tr><td>SWP10</td><td>10</td><td>1.2</td><td>30</td><td>1.8N/mm</td></tr>
    <tr><td>SWP16</td><td>16</td><td>1.8</td><td>40</td><td>3.5N/mm</td></tr>
    <tr><td>SWP20</td><td>20</td><td>2.5</td><td>50</td><td>7.2N/mm</td></tr></table>
    <div class="pc-divider"></div>

    <div class="pc-hdr"><span class="pc-hdr-l">${ch.name.split('·')[0]}</span><span class="pc-hdr-r">P.${pg}</span></div>

    <div class="pc-sub" style="margin-top:6px;">本章收录该分类下全系列标准品，涵盖各型号规格参数、尺寸数据及选型说明，请参照产品型号规则进行选型订购。</div>

function makePage(pg) {
  const d = document.createElement('div');
  d.className = 'page-canvas';
  d.innerHTML = `<div class="pc">${getContent(pg)}</div><div class="pc-num">${pg}</div>`;
  return d;
}

function makeSpread(pg) {
  const wrap = document.createElement('div');
  wrap.className = 'spread-wrap';
  wrap.appendChild(makePage(pg));
  if (pg > 1 && pg + 1 <= TOTAL) wrap.appendChild(makePage(pg + 1));
  return wrap;
}

function render(newPg, dir) {
  console.log('newPg',newPg);
  
  if (animating) return;
  animating = true;
  const c = document.getElementById('spread-container');
  const old = c.querySelector('.spread-wrap');
  console.log('old',old);
  
  if (old) {
    old.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
    // setTimeout(() => old.remove(), 0);
    old.remove()
  }
  cur = newPg;
  const neo = makeSpread(cur);
  neo.classList.add(dir > 0 ? 'anim-right' : 'anim-left');
  c.appendChild(neo);
  setTimeout(() => { animating = false; }, 260);
  updateUI();
}

function updateUI() {
  document.getElementById('page-input').value = cur;
  const pct = Math.round((cur - 1) / (TOTAL - 1) * 100);
  document.getElementById('progress-fill').style.width = Math.max(0.05, pct) + '%';
  document.getElementById('pct-label').textContent = pct + '%';
  document.querySelectorAll('.toc-item').forEach(el => {
    el.classList.toggle('current', +el.dataset.pg === getTOCActive());
  });
}

function getTOCActive() {
  const ch = tocData.slice().reverse().find(t => cur >= t.pg);
  return ch ? ch.pg : 0;
}

function prevPage() { if (cur > 1) render(Math.max(1, cur - 20), -1); }
function nextPage() { if (cur < TOTAL) render(Math.min(TOTAL - 1, cur + 20), 1); }
function firstPage() { if (cur !== 1) render(1, -1); }
function lastPage() { if (cur < TOTAL - 1) render(TOTAL - 1, 1); }
function jumpTo(pg) {
  pg = Math.max(1, Math.min(TOTAL, pg || 1));
  render(pg, pg >= cur ? 1 : -1);
}
function seekBar(e) {
  const r = document.getElementById('progress-track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  jumpTo(Math.round(pct * (TOTAL - 1) + 1));
}

function toggleTOC() {
  tocOpen = !tocOpen;
  document.getElementById('toc-panel').classList.toggle('open', tocOpen);
  document.getElementById('toc-btn').classList.toggle('on', tocOpen);
  document.getElementById('rail-toc').classList.toggle('toc-trigger', tocOpen);
  document.getElementById('rail-toc').classList.toggle('active', tocOpen);
}

function toggleFav() {
  favOn = !favOn;
  document.getElementById('fav-btn').classList.toggle('on', favOn);
}

function buildTOC(q) {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  const f = (q || '').trim().toLowerCase();
  tocData.forEach(t => {
    if (f && !t.name.toLowerCase().includes(f) && !t.n.includes(f)) return;
    const d = document.createElement('div');
    d.className = 'toc-item' + (cur >= t.pg && cur < t.next ? ' current' : '');
    d.dataset.pg = t.pg;
    const hl = f ? t.name.replace(new RegExp(f,'gi'), m=>`<mark style="background:#fff3c4;border-radius:2px;padding:0 1px;">${m}</mark>`) : t.name;
    d.innerHTML = `<span class="toc-num">${t.n}</span><span class="toc-name">${hl}</span><span class="toc-pg">P.${t.pg}</span>`;
    d.onclick = () => { render(t.pg, t.pg >= cur ? 1 : -1); };
    list.appendChild(d);
  });
}
function filterTOC(v) { buildTOC(v); }
function resetTOC() { document.getElementById('toc-q').value = ''; buildTOC(''); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
  if (e.key === 'Home') firstPage();
  if (e.key === 'End') lastPage();
});

// Init
buildTOC();
const init = makeSpread(1);
document.getElementById('spread-container').appendChild(init);
updateUI();
</script>
